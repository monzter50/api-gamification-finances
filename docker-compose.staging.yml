# =============================================================================
# Staging overrides.
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml \
#     --env-file .env.staging up -d
# =============================================================================

services:
  api:
    restart: always
    # Staging uses external managed Postgres (Neon). DATABASE_URL is
    # set in .env.staging — the api no longer waits for an in-cluster DB.
    depends_on: !reset []
    environment:
      NODE_ENV: staging
      LOG_LEVEL: info
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Embedded Postgres is disabled in staging — using Neon instead.
  # If you ever need to roll back to in-cluster DB, delete this block.
  postgres:
    profiles:
      - never
