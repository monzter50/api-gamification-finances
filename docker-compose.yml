# =============================================================================
# Base compose file — common to ALL environments.
# Environment-specific overrides live in:
#   docker-compose.override.yml   -> dev (auto-loaded by `docker compose up`)
#   docker-compose.staging.yml    -> staging
#   docker-compose.prod.yml       -> production
#
# Usage:
#   Dev        : docker compose up
#   Staging    : docker compose -f docker-compose.yml -f docker-compose.staging.yml --env-file .env.staging up -d
#   Production : docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: gamification-api:${IMAGE_TAG:-latest}
    container_name: gamification-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      # DATABASE_URL is composed from Postgres credentials so it always
      # points at the in-network "postgres" host. Overridden in prod
      # (managed DB) via .env.production.
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_VERSION: ${API_VERSION:-v1}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gamification-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: gamification-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gamification-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  gamification-network:
    driver: bridge

volumes:
  postgres-data:
